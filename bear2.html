<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D空間認識ARカメラ（安定版）</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
:root { --app-height: 100dvh; }

html, body {
  margin: 0; width: 100%; height: var(--app-height); overflow: hidden;
  background: #000; touch-action: none;
}

/* 💡 自前のビデオタグを画面全体にぴったり広げる（絶対に切れません） */
#cameraVideo {
  position: fixed; inset: 0; width: 100vw; height: var(--app-height);
  object-fit: cover; z-index: 0; background: #000;
}

.model-scene {
  position: fixed !important; inset: 0 !important;
  width: 100vw !important; height: var(--app-height) !important;
  z-index: 1 !important; background: transparent !important;
}

.model-scene canvas, .model-scene .a-canvas { background: transparent !important; }

/* 自撮りモードの時のミラー反転 */
.mirror #cameraVideo { transform: scaleX(-1); }

.old-photo-filter {
  display: none; position: fixed; inset: 0; width: 100vw; height: var(--app-height);
  z-index: 20; pointer-events: none;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0) 45%, rgba(60,30,0,.38) 100%),
    repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0px, rgba(255,255,255,.05) 1px, transparent 2px, transparent 7px);
  mix-blend-mode: multiply;
}

.old-photo-on #cameraVideo, .old-photo-on .model-scene canvas {
  filter: sepia(.9) contrast(1.08) brightness(.9) saturate(.58) !important;
}

.old-photo-on .old-photo-filter { display: block; }

.ui { position: fixed; inset: 0; z-index: 999; pointer-events: none; }

.filter-btn {
  position: fixed; left: 12px; bottom: 24px; font-size: 13px;
  padding: 10px 14px; border-radius: 999px; border: none;
  background: rgba(255,255,255,.85); pointer-events: auto;
}

.filter-btn.on { background: rgba(120,70,25,.9); color: #fff; }

.shutter {
  width: 74px; height: 74px; position: fixed; bottom: 24px; left: 50%;
  margin-left: -37px; border-radius: 50%; border: 5px solid #fff;
  background: rgba(255,255,255,.85); pointer-events: auto;
}

.shutter:active { transform: scale(0.9); }

.flip-btn {
  position: fixed; top: 12px; right: 12px; width: 44px; height: 44px;
  border-radius: 50%; border: none; background: rgba(255,255,255,.85);
  pointer-events: auto; padding: 10px; z-index: 1001;
}

.flip-btn:active { transform: scale(0.9); }
.flip-btn img { width: 100%; height: 100%; }

.status {
  position: fixed; top: 12px; left: 12px; z-index: 1000;
  background: rgba(0,0,0,.65); color: #fff; font-size: 13px;
  padding: 8px 14px; border-radius: 999px; pointer-events: none;
}

.preview {
  position: fixed; inset: 0; z-index: 99999; background: rgba(0, 0, 0, 0.95); display: none;
}

.preview img { width: 100vw; height: calc(var(--app-height) - 100px); object-fit: contain; }

.preview-ui {
  position: fixed; left: 0; right: 0; bottom: 24px;
  display: flex; justify-content: center; gap: 10px;
}

.preview-ui button, .preview-ui a {
  border: none; border-radius: 999px; background: #fff; color: #000;
  padding: 14px 24px; font-size: 14px; font-weight: bold; text-decoration: none;
}

#retakeBtn { background: #555; color: #fff; }
#saveBtn { background: #ffcc00; color: #000; }
#shareBtn { background: #00c300; color: #fff; }

#saveToast {
  position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%);
  background: rgba(0,0,0,.85); color: #fff; padding: 12px 18px; border-radius: 999px;
  font-size: 14px; z-index: 999999; display: none;
}

#shot-effect {
  position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 50000; pointer-events: none;
}
</style>
</head>

<body>

<video id="cameraVideo" autoplay playsinline muted></video>

<a-scene
  id="scene"
  class="model-scene"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="alpha: true; antialias: true; preserveDrawingBuffer: true; colorManagement: true;"
>
  <a-assets>
    <a-asset-item id="bearModel" src="img/bear.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: true; pointerLockEnabled: false"></a-camera>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" position="-1 2 2" intensity="0.5"></a-light>

  <a-entity id="ar-anchor" position="0 -0.4 -2.5">
    
    <a-entity id="arReticle" visible="true">
      <a-ring rotation="-90 0 0" radius-inner="0.15" radius-outer="0.2" color="#ffcc00" opacity="0.8"></a-ring>
      <a-cone radius-bottom="0.03" radius-top="0" height="0.1" position="0 0.05 0" color="#ffcc00" rotation="180 0 0"></a-cone>
    </a-entity>

    <a-entity
      id="bearWrap"
      rotation="0 180 0"
      scale="1.5 1.5 1.5"
      visible="false">
      <a-gltf-model id="carModelEntity" src="#bearModel"></a-gltf-model>
    </a-entity>

  </a-entity>
</a-scene>

<div class="old-photo-filter" id="oldPhotoFilter"></div>
<div class="status" id="status">スマホを前にかざし、画面をタップしてクマを配置</div>

<div class="ui">
  <button class="flip-btn" id="flipBtn">
    <img src="./img/ico_hanten.png" alt="反転">
  </button>
  <button class="filter-btn" id="filterBtn">古写真フィルター</button>
  <button class="shutter" id="captureBtn" aria-label="撮影"></button>
</div>

<div class="preview" id="preview">
  <img id="previewImg" alt="">
  <div class="preview-ui">
    <button id="retakeBtn">撮り直し</button>
    <a id="saveBtn" href="#">保存する</a>
    <button id="shareBtn">シェア</button>
  </div>
</div>

<div id="saveToast">📸 写真を保存しました</div>
<div id="shot-effect"></div>

<script>
const video = document.getElementById('cameraVideo');
const sceneEl = document.getElementById('scene');
const captureBtn = document.getElementById('captureBtn');
const filterBtn = document.getElementById('filterBtn');
const flipBtn = document.getElementById('flipBtn');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const retakeBtn = document.getElementById('retakeBtn');
const saveBtn = document.getElementById('saveBtn');
const shareBtn = document.getElementById('shareBtn');
const saveToast = document.getElementById('saveToast');
const shotEffect = document.getElementById('shot-effect');
const statusEl = document.getElementById('status');

const arReticle = document.getElementById('arReticle');
const bearWrap = document.getElementById('bearWrap');

let stream = null;
let facingMode = 'environment';
let oldPhotoEnabled = false;
let currentDataUrl = null;
let isPlaced = false;

const FIX_POS_X = 0; const FIX_POS_Y = -0.4; const FIX_POS_Z = -2.5;

async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
  try {
    const constraints = {
      video: { facingMode: { ideal: facingMode }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    
    if (facingMode === 'user') {
      document.body.classList.add('mirror');
    } else {
      document.body.classList.remove('mirror');
    }
  } catch (e) {
    alert('カメラの起動に失敗しました。');
  }
}

// 画面タップで確定配置（誤動作を防ぐpointerup）
window.addEventListener('pointerup', e => {
  if (e.target.closest('button') || e.target.closest('a') || preview.style.display === 'block') return;

  if (!isPlaced) {
    bearWrap.setAttribute('position', `${FIX_POS_X} ${FIX_POS_Y} ${FIX_POS_Z}`);
    bearWrap.setAttribute('visible', 'true');
    arReticle.setAttribute('visible', 'false');
    isPlaced = true;
    statusEl.textContent = 'クマを配置しました！撮影ボタンでパシャリ';
  }
});

filterBtn.addEventListener('click', () => {
  oldPhotoEnabled = !oldPhotoEnabled;
  document.body.classList.toggle('old-photo-on', oldPhotoEnabled);
  filterBtn.classList.toggle('on', oldPhotoEnabled);
});

flipBtn.addEventListener('click', async () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
  
  isPlaced = false;
  arReticle.setAttribute('visible', 'true');
  bearWrap.setAttribute('visible', 'false');
  statusEl.textContent = 'スマホを前にかざし、画面をタップしてクマを配置';
});

function playShotEffect() {
  shotEffect.style.opacity = '0.9';
  setTimeout(() => { shotEffect.style.opacity = '0'; }, 120);
}

captureBtn.addEventListener('click', () => {
  if (!video.videoWidth) return;

  playShotEffect();

  const canvas = document.createElement('canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  if (oldPhotoEnabled) ctx.filter = 'sepia(0.9) contrast(1.08) brightness(0.9) saturate(0.58)';

  const videoRatio = video.videoWidth / video.videoHeight;
  const canvasRatio = canvas.width / canvas.height;
  let sx, sy, sw, sh;
  if (videoRatio > canvasRatio) {
    sh = video.videoHeight; sw = sh * canvasRatio;
    sx = (video.videoWidth - sw) / 2; sy = 0;
  } else {
    sw = video.videoWidth; sh = sw / canvasRatio;
    sx = 0; sy = (video.videoHeight - sh) / 2;
  }
  
  if (facingMode === 'user') { ctx.save(); ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
  if (facingMode === 'user') { ctx.restore(); }

  const aframeCanvas = sceneEl.canvas;
  if (aframeCanvas) {
    sceneEl.renderer.render(sceneEl.object3D, sceneEl.camera);
    if (!oldPhotoEnabled) ctx.filter = 'saturate(0.74) contrast(0.88) brightness(0.94) blur(0.28px)';
    ctx.drawImage(aframeCanvas, 0, 0, canvas.width, canvas.height);
  }

  ctx.filter = 'none';
  currentDataUrl = canvas.toDataURL('image/png');
  previewImg.src = currentDataUrl;
  saveBtn.href = currentDataUrl;
  saveBtn.download = `bear-ar_${Date.now()}.png`;

  preview.style.display = 'block';
});

retakeBtn.addEventListener('click', () => {
  preview.style.display = 'none';
  isPlaced = false;
  arReticle.setAttribute('visible', 'true');
  bearWrap.setAttribute('visible', 'false');
  statusEl.textContent = 'スマホを前にかざし、画面をタップしてクマを配置';
});

saveBtn.addEventListener('click', () => {
  saveToast.style.display = 'block';
  setTimeout(() => {
    saveToast.style.display = 'none';
    preview.style.display = 'none';
  }, 1200);
});

shareBtn.addEventListener('click', async () => {
  if (!currentDataUrl) return;
  try {
    const bin = atob(currentDataUrl.split(',')[1]);
    const buffer = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buffer[i] = bin.charCodeAt(i);
    const file = new File([new Blob([buffer], { type: 'image/png' })], 'bear-ar.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: '3DクマAR', text: 'AR撮影したよ！' });
    }
  } catch (err) {}
});

startCamera();
</script>
</body>
</html>
